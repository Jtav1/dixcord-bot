# Run: docker compose up --build
# Provide .env at repo root (or webapi/.env and discord-bot/.env) with secrets.
# With MySQL disabled, webapi uses SQLite by default (DB_TYPE=sqlite).

services:
  webapi:
    build:
      context: ./webapi
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./webapi/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    # When using MySQL, uncomment below and the mysql service:
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    # environment:
    #   - DB_TYPE=mysql
    #   - DB_HOST=mysql
    #   - DB_PORT=3306
    #   - DB_USER=root
    #   - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
    #   - DB_NAME=api_template
    restart: unless-stopped

  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    env_file:
      - ./discord-bot/.env
    # When using MySQL, uncomment below and the mysql service:
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    # environment:
    #   - MYSQL_HOST=mysql
    #   - MYSQL_PORT=3306
    #   - MYSQL_USER=root
    #   - MYSQL_PW=${MYSQL_ROOT_PASSWORD:-changeme}
    #   - MYSQL_DB=api_template
    restart: unless-stopped

  # MySQL (optional). Uncomment this service and the depends_on/env blocks above to use it.
  # mysql:
  #   image: mysql:8.0
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
  #     MYSQL_DATABASE: api_template
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #   restart: unless-stopped

